<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Lost Libraries — Animated Timeline of Erasure</title>
  <meta name="description" content="Year-by-year animated sweep of 108 library destructions across 3,785 years.">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Crimson+Pro:ital,wght@0,300;0,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:#08060a; --parch:#ede4d4; --aged:#c0a880;
      --ember:#e05520; --gold:#d09820; --ash:#4a3e5a;
      --smoke:#8a7a9a; --panel:#10080f;
      --war:#d03820; --religion:#6848c8; --govt:#c88020;
      --fire:#c87020; --civil:#5848a8; --neglect:#308060;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;background:var(--ink)}
    body{font-family:'Crimson Pro',Georgia,serif;color:var(--parch)}

    /* SVG MAP */
    #stage{position:absolute;inset:0;display:flex;flex-direction:column}
    #map-svg{flex:1;display:block;width:100%}

    /* GRATICULE + LAND */
    .land{fill:#1a1420;stroke:#2a2030;stroke-width:0.3}
    .graticule{fill:none;stroke:rgba(201,185,154,0.04);stroke-width:0.5}
    .border{fill:none;stroke:#2a2030;stroke-width:0.4}

    /* PARTICLES */
    .lib-dot{
      cursor:pointer;
      transition:r 0.3s ease;
    }
    .lib-dot:hover{filter:brightness(1.5)}
    .lib-ring{
      fill:none; pointer-events:none;
      animation:ringOut 1.2s ease-out forwards;
    }
    @keyframes ringOut{
      from{r:0;opacity:0.8;stroke-width:3}
      to{r:22;opacity:0;stroke-width:0.5}
    }
    .lib-flash{
      pointer-events:none;
      animation:flash 0.8s ease-out forwards;
    }
    @keyframes flash{
      0%{r:14;opacity:1}
      100%{r:0;opacity:0}
    }

    /* YEAR DISPLAY */
    #year-display{
      position:absolute;
      left:50%;transform:translateX(-50%);
      top:50%;margin-top:-4rem;
      font-family:'Playfair Display',serif;
      font-size:clamp(3rem,8vw,7rem);
      font-weight:900;
      color:rgba(224,85,32,0.08);
      pointer-events:none;
      white-space:nowrap;
      transition:color 0.3s;
      z-index:1;
    }

    /* TOP HUD */
    #hud{
      position:absolute;top:0;left:0;right:0;z-index:10;
      background:linear-gradient(180deg,rgba(8,6,10,0.96) 0%,rgba(8,6,10,0.8) 70%,transparent 100%);
      padding:1rem 1.5rem 3rem;
      display:flex;align-items:flex-start;gap:1.5rem;flex-wrap:wrap;
    }
    #hud-title{flex-shrink:0}
    #hud-title h1{
      font-family:'Playfair Display',serif;
      font-size:clamp(0.95rem,2.2vw,1.4rem);
      font-weight:900;color:var(--parch);line-height:1.1;
    }
    #hud-title h1 em{font-style:italic;color:var(--ember)}
    #hud-title p{
      font-family:'Courier Prime',monospace;
      font-size:0.58rem;letter-spacing:0.2em;
      color:var(--gold);text-transform:uppercase;margin-bottom:0.15rem;
    }

    /* CONTROLS */
    #controls{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;margin-top:0.3rem}
    .ctrl-btn{
      font-family:'Courier Prime',monospace;
      font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;
      padding:0.4rem 1rem;border:1px solid rgba(201,185,154,0.25);
      background:rgba(8,6,10,0.8);color:var(--smoke);
      cursor:pointer;border-radius:2px;transition:all 0.2s;
      min-width:44px;min-height:36px;
    }
    .ctrl-btn:hover,.ctrl-btn.active{border-color:var(--ember);color:var(--ember);background:rgba(224,85,32,0.12)}
    .ctrl-btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
    .ctrl-btn#btn-play{font-size:1rem;padding:0.3rem 0.9rem}

    .speed-group{display:flex;align-items:center;gap:0.4rem}
    .speed-label{font-family:'Courier Prime',monospace;font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--smoke)}

    /* YEAR COUNTER HUD */
    #year-hud{display:flex;align-items:baseline;gap:0.5rem;margin-left:auto}
    #year-now{
      font-family:'Playfair Display',serif;
      font-size:clamp(1.5rem,4vw,2.8rem);font-weight:900;
      color:var(--ember);line-height:1;
    }
    #year-label{
      font-family:'Courier Prime',monospace;
      font-size:0.6rem;letter-spacing:0.1em;
      text-transform:uppercase;color:var(--smoke);
    }

    /* BOTTOM HUD */
    #bottom{
      position:absolute;bottom:0;left:0;right:0;z-index:10;
      background:linear-gradient(0deg,rgba(8,6,10,0.97) 0%,rgba(8,6,10,0.8) 60%,transparent 100%);
      padding:3rem 1.5rem 1rem;
    }

    /* PROGRESS TIMELINE */
    #progress-wrap{position:relative;margin-bottom:0.75rem}
    #progress-track{
      height:3px;background:rgba(201,185,154,0.12);
      border-radius:2px;position:relative;cursor:pointer;
    }
    #progress-fill{
      height:100%;background:linear-gradient(90deg,var(--ember),var(--gold));
      border-radius:2px;width:0%;transition:width 0.1s linear;pointer-events:none;
    }
    #scrubber{
      position:absolute;top:-4px;
      width:11px;height:11px;background:var(--ember);
      border-radius:50%;transform:translateX(-50%);
      cursor:grab;transition:left 0.1s linear;
      box-shadow:0 0 6px var(--ember);
    }
    #scrubber:active{cursor:grabbing}

    /* ERA MARKERS */
    .era-tick{
      position:absolute;top:-8px;width:1px;height:19px;
      background:rgba(201,185,154,0.15);pointer-events:none;
    }
    .era-tick-label{
      position:absolute;top:10px;
      font-family:'Courier Prime',monospace;font-size:0.45rem;
      color:rgba(201,185,154,0.35);text-transform:uppercase;
      transform:translateX(-50%);white-space:nowrap;pointer-events:none;
    }

    /* STATS ROW */
    #stats-row{display:flex;gap:2rem;align-items:center;flex-wrap:wrap}
    .sstat{text-align:center}
    .sstat-n{
      font-family:'Playfair Display',serif;font-size:1.6rem;
      font-weight:700;color:var(--ember);line-height:1;
    }
    .sstat-l{
      font-family:'Courier Prime',monospace;font-size:0.52rem;
      letter-spacing:0.12em;text-transform:uppercase;color:var(--smoke);
    }

    /* LEGEND */
    #legend{
      display:flex;gap:0.75rem;flex-wrap:wrap;margin-left:auto;align-items:center;
    }
    .leg-item{display:flex;align-items:center;gap:0.3rem}
    .leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .leg-lbl{font-family:'Courier Prime',monospace;font-size:0.55rem;color:var(--aged)}

    /* TOOLTIP */
    #tooltip{
      position:absolute;z-index:20;pointer-events:none;
      background:rgba(10,7,14,0.94);border:1px solid rgba(201,185,154,0.2);
      padding:0.5rem 0.8rem;max-width:220px;display:none;
    }
    .tt-name{font-family:'Playfair Display',serif;font-size:0.9rem;color:var(--parch);margin-bottom:0.15rem}
    .tt-loc{font-family:'Courier Prime',monospace;font-size:0.6rem;color:var(--smoke)}

    /* FLASH LOG */
    #flash-log{
      position:absolute;right:1.5rem;top:6rem;z-index:10;
      display:flex;flex-direction:column;gap:0.3rem;
      max-width:200px;pointer-events:none;
    }
    .log-entry{
      font-family:'Courier Prime',monospace;font-size:0.6rem;
      color:var(--parch);background:rgba(8,6,10,0.85);
      border-left:2px solid var(--ember);padding:0.2rem 0.5rem;
      animation:logIn 0.3s ease forwards, logOut 0.5s 3s ease forwards;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    @keyframes logIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
    @keyframes logOut{to{opacity:0;height:0;padding:0;margin:0}}

    @media(max-width:600px){
      #hud{padding:0.75rem 1rem 2.5rem}
      #bottom{padding:2.5rem 1rem 0.75rem}
      #flash-log{display:none}
      #legend{display:none}
    }
  </style>
</head>

</div>

// Sort by year
LIBRARIES.sort(function(a,b){return a.year - b.year;});

var MIN_YEAR = -1761;
var MAX_YEAR = 2024;
var TOTAL_SPAN = MAX_YEAR - MIN_YEAR;

// Equirectangular projection
var SVG_W = 960, SVG_H = 500;
function project(lat, lon) {
  var x = (lon + 180) / 360 * SVG_W;
  var y = (90 - lat) / 180 * SVG_H;
  return { x: x, y: y };
}

// Draw simplified world map using Natural Earth-style paths
var svgNS = 'http://www.w3.org/2000/svg';
var countriesG = document.getElementById('countries');

// Simple graticule
function drawGraticule() {
  for (var lon = -180; lon <= 180; lon += 30) {
    var el = document.createElementNS(svgNS, 'line');
    var x = (lon + 180) / 360 * SVG_W;
    el.setAttribute('x1', x); el.setAttribute('y1', 0);
    el.setAttribute('x2', x); el.setAttribute('y2', SVG_H);
    el.setAttribute('class', 'graticule');
    countriesG.appendChild(el);
  }
  for (var lat = -90; lat <= 90; lat += 30) {
    var el2 = document.createElementNS(svgNS, 'line');
    var y = (90 - lat) / 180 * SVG_H;
    el2.setAttribute('x1', 0); el2.setAttribute('y1', y);
    el2.setAttribute('x2', SVG_W); el2.setAttribute('y2', y);
    el2.setAttribute('class', 'graticule');
    countriesG.appendChild(el2);
  }
}
drawGraticule();

// ANIMATION STATE
var currentYear = MIN_YEAR;
var isPlaying = false;
var speed = 1; // years per frame at 60fps => adjust
var animFrame = null;
var lastTimestamp = null;
var yearsPerSecond = 50; // base speed
var placedIds = {};

var dotsLayer = document.getElementById('dots-layer');
var animLayer = document.getElementById('anim-layer');
var yearDisplay = document.getElementById('year-display');
var yearNow = document.getElementById('year-now');
var cntTotal = document.getElementById('cnt-total');
var cntCentury = document.getElementById('cnt-century');
var cntYear = document.getElementById('cnt-year');
var progressFill = document.getElementById('progress-fill');
var scrubberEl = document.getElementById('scrubber');
var flashLog = document.getElementById('flash-log');

function yearToStr(y) {
  return y < 0 ? (Math.abs(y) + ' BC') : (y + ' AD');
}

function getPct(y) {
  return (y - MIN_YEAR) / TOTAL_SPAN * 100;
}

function placeLib(lib) {
  if (placedIds[lib.id]) return;
  placedIds[lib.id] = true;
  var p = project(lib.lat, lib.lon);
  var color = CAUSE_COLORS[lib.cause] || '#888';

  // Persistent dot
  var dot = document.createElementNS(svgNS, 'circle');
  dot.setAttribute('cx', p.x); dot.setAttribute('cy', p.y);
  dot.setAttribute('r', 3.5); dot.setAttribute('fill', color);
  dot.setAttribute('fill-opacity', '0.75');
  dot.setAttribute('class', 'lib-dot');
  dot.setAttribute('tabindex', '0');
  dot.setAttribute('role', 'img');
  dot.setAttribute('aria-label', lib.name + ' — ' + yearToStr(lib.year));
  dotsLayer.appendChild(dot);

  // Burst ring animation
  var ring = document.createElementNS(svgNS, 'circle');
  ring.setAttribute('cx', p.x); ring.setAttribute('cy', p.y);
  ring.setAttribute('r', '0'); ring.setAttribute('fill', 'none');
  ring.setAttribute('stroke', color); ring.setAttribute('class', 'lib-ring');
  animLayer.appendChild(ring);

  // Flash fill
  var flash = document.createElementNS(svgNS, 'circle');
  flash.setAttribute('cx', p.x); flash.setAttribute('cy', p.y);
  flash.setAttribute('r', '0'); flash.setAttribute('fill', color);
  flash.setAttribute('class', 'lib-flash');
  animLayer.appendChild(flash);

  setTimeout(function() {
    if (ring.parentNode) ring.parentNode.removeChild(ring);
    if (flash.parentNode) flash.parentNode.removeChild(flash);
  }, 1400);

  // Flash log
  if (speed <= 3) {
    var entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.style.borderColor = color;
    entry.textContent = yearToStr(lib.year) + ' — ' + lib.name;
    flashLog.insertBefore(entry, flashLog.firstChild);
    if (flashLog.children.length > 4) flashLog.removeChild(flashLog.lastChild);
    setTimeout(function(){ if(entry.parentNode) entry.parentNode.removeChild(entry); }, 4000);
  }
}

function updateStats() {
  var total = 0, inCentury = 0, inYear = 0;
  var currentCentury = Math.floor(currentYear / 100) * 100;
  LIBRARIES.forEach(function(lib) {
    if (lib.year <= currentYear) {
      total++;
      if (lib.year >= currentCentury && lib.year < currentCentury + 100) inCentury++;
      if (lib.year === Math.round(currentYear)) inYear++;
    }
  });
  cntTotal.textContent = total;
  cntCentury.textContent = inCentury;
  cntYear.textContent = inYear > 0 ? inYear : '—';
}

function updateHUD() {
  var ys = yearToStr(Math.round(currentYear));
  yearDisplay.textContent = ys;
  yearNow.textContent = ys;
  var pct = getPct(currentYear);
  progressFill.style.width = pct + '%';
  scrubberEl.style.left = pct + '%';
  document.getElementById('progress-track').setAttribute('aria-valuenow', Math.round(pct));
  // Glow intensity based on recency
  var intensity = Math.min(0.18, 0.04 + (currentYear > 1900 ? 0.14 : 0));
  yearDisplay.style.color = 'rgba(224,85,32,' + intensity + ')';
}

function stepTo(targetYear) {
  LIBRARIES.forEach(function(lib) {
    if (lib.year <= targetYear && !placedIds[lib.id]) {
      placeLib(lib);
    }
  });
  currentYear = targetYear;
  updateHUD();
  updateStats();
}

function animate(timestamp) {
  if (!lastTimestamp) lastTimestamp = timestamp;
  var delta = (timestamp - lastTimestamp) / 1000; // seconds
  lastTimestamp = timestamp;
  var advance = yearsPerSecond * speed * delta;
  var nextYear = currentYear + advance;
  if (nextYear >= MAX_YEAR) {
    nextYear = MAX_YEAR;
    stepTo(nextYear);
    stopPlayback();
    return;
  }
  stepTo(nextYear);
  animFrame = requestAnimationFrame(animate);
}

function startPlayback() {
  if (currentYear >= MAX_YEAR) resetAll();
  isPlaying = true;
  lastTimestamp = null;
  document.getElementById('btn-play').textContent = '⏸';
  document.getElementById('btn-play').setAttribute('aria-pressed', 'true');
  document.getElementById('btn-play').setAttribute('aria-label', 'Pause animation');
  animFrame = requestAnimationFrame(animate);
}

function stopPlayback() {
  isPlaying = false;
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  document.getElementById('btn-play').textContent = '▶';
  document.getElementById('btn-play').setAttribute('aria-pressed', 'false');
  document.getElementById('btn-play').setAttribute('aria-label', 'Play animation');
}

function resetAll() {
  stopPlayback();
  currentYear = MIN_YEAR;
  placedIds = {};
  while (dotsLayer.firstChild) dotsLayer.removeChild(dotsLayer.firstChild);
  while (animLayer.firstChild) animLayer.removeChild(animLayer.firstChild);
  while (flashLog.firstChild) flashLog.removeChild(flashLog.firstChild);
  updateHUD();
  updateStats();
}

// CONTROLS
document.getElementById('btn-play').addEventListener('click', function() {
  if (isPlaying) stopPlayback(); else startPlayback();
});
document.getElementById('btn-reset').addEventListener('click', resetAll);
document.querySelectorAll('[data-speed]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    speed = parseFloat(btn.dataset.speed);
    document.querySelectorAll('[data-speed]').forEach(function(b) {
      b.classList.remove('active');
      b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-pressed', 'true');
  });
});

// SCRUBBER
var isDragging = false;
function scrubTo(clientX) {
  var track = document.getElementById('progress-track');
  var rect = track.getBoundingClientRect();
  var pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  var targetYear = MIN_YEAR + pct * TOTAL_SPAN;
  // Place all libs up to this year
  placedIds = {};
  while (dotsLayer.firstChild) dotsLayer.removeChild(dotsLayer.firstChild);
  while (animLayer.firstChild) animLayer.removeChild(animLayer.firstChild);
  currentYear = MIN_YEAR;
  LIBRARIES.forEach(function(lib) {
    if (lib.year <= targetYear) placeLib(lib);
  });
  currentYear = targetYear;
  updateHUD();
  updateStats();
}
document.getElementById('progress-track').addEventListener('mousedown', function(e) {
  isDragging = true; stopPlayback(); scrubTo(e.clientX);
});
document.getElementById('progress-track').addEventListener('touchstart', function(e) {
  isDragging = true; stopPlayback(); scrubTo(e.touches[0].clientX);
}, {passive:true});
window.addEventListener('mousemove', function(e) { if (isDragging) scrubTo(e.clientX); });
window.addEventListener('touchmove', function(e) { if (isDragging) scrubTo(e.touches[0].clientX); }, {passive:true});
window.addEventListener('mouseup', function() { isDragging = false; });
window.addEventListener('touchend', function() { isDragging = false; });

// KEYBOARD on track
document.getElementById('progress-track').addEventListener('keydown', function(e) {
  var step = TOTAL_SPAN / 100;
  if (e.key === 'ArrowRight') stepTo(Math.min(MAX_YEAR, currentYear + step));
  if (e.key === 'ArrowLeft') stepTo(Math.max(MIN_YEAR, currentYear - step));
});

// SVG TOOLTIP
document.getElementById('map-svg').addEventListener('mousemove', function(e) {
  var target = e.target;
  if (target.classList.contains('lib-dot')) {
    // Find lib by position
    var cx = parseFloat(target.getAttribute('cx'));
    var cy = parseFloat(target.getAttribute('cy'));
    var found = null;
    LIBRARIES.forEach(function(lib) {
      var p = project(lib.lat, lib.lon);
      if (Math.abs(p.x - cx) < 1 && Math.abs(p.y - cy) < 1) found = lib;
    });
    if (found) {
      var tt = document.getElementById('tooltip');
      tt.style.display = 'block';
      tt.style.left = (e.pageX + 14) + 'px';
      tt.style.top  = (e.pageY - 30) + 'px';
      document.getElementById('tt-name').textContent = found.name;
      document.getElementById('tt-loc').textContent = found.loc + ' · ' + yearToStr(found.year);
    }
  } else {
    document.getElementById('tooltip').style.display = 'none';
  }
});

// ADD ERA TICK MARKS
var eras = [
  {year:-1000,label:'-1000'},{year:0,label:'0'},{year:500,label:'500'},
  {year:1000,label:'1000'},{year:1500,label:'1500'},{year:1800,label:'1800'},
  {year:1900,label:'1900'},{year:1950,label:'1950'},{year:2000,label:'2000'}

var track = document.getElementById('progress-track');
eras.forEach(function(e) {

  var lbl = document.createElement('div');
  lbl.className = 'era-tick-label';
  lbl.style.left = pct + '%';
  lbl.textContent = e.label;
  track.appendChild(lbl);
});

// INIT
updateHUD();
updateStats();
